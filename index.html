<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Калькулятор зарплаты</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page">
    <div class="calculator-card">
        <div class="topbar">
            <div>
                <h1 class="title">Калькулятор зарплаты</h1>
                <p class="subtitle">
                    Введите данные сотрудника для расчета заработной платы
                </p>
            </div>

            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                🌙 Тёмная тема
            </button>
        </div>


        <form id="salaryForm" class="salary-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="city">Город</label>
                    <select id="city" name="city" required>
                        <option value="budennovsk" selected>Буденновск</option>
                        <option value="blagodarny">Благодарный</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="hoursWorked">Кол-во часов сотрудника</label>
                    <input
                            type="number"
                            id="hoursWorked"
                            name="hoursWorked"
                            min="0"
                            step="0.1"
                            placeholder="Например: 160"
                            required
                    />
                </div>

                <div class="form-group">
                    <label for="daysInMonth">Дней в месяце</label>
                    <select id="daysInMonth" name="daysInMonth" required>
                        <option value="28">28</option>
                        <option value="29">29</option>
                        <option value="30">30</option>
                        <option value="31" selected>31</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="storeMbo">Процент МБО магазина</label>
                    <input
                            type="number"
                            id="storeMbo"
                            name="storeMbo"
                            min="0"
                            step="0.01"
                            placeholder="Например: 95"
                            required
                    />
                </div>

                <div class="form-group">
                    <label for="employeeMbo">Процент МБО сотрудника</label>
                    <input
                            type="number"
                            id="employeeMbo"
                            name="employeeMbo"
                            min="0"
                            step="0.01"
                            placeholder="Например: 87"
                            required
                    />
                </div>

                <div class="form-group">
                    <label for="storeTurnover">Товарооборот магазина</label>
                    <input
                            type="number"
                            id="storeTurnover"
                            name="storeTurnover"
                            min="0"
                            step="0.01"
                            placeholder="Например: 1250000"
                            required
                    />
                </div>

                <div class="form-group">
                    <label for="staffPlan">Штатное расписание</label>
                    <input
                            type="number"
                            id="staffPlan"
                            name="staffPlan"
                            min="1"
                            step="1"
                            placeholder="Например: 4"
                            required
                    />
                </div>

                <div class="form-group">
                    <label for="position">Должность</label>
                    <select id="position" name="position" required>
                        <option value="" disabled selected>Выберите должность</option>
                        <option value="administrator">Администратор</option>
                        <option value="administrator_1_month">Администратор 1 мес</option>
                        <option value="administrator_2_month">Администратор 2 мес</option>
                        <option value="opp">ОПП</option>
                        <option value="cashier">Кассир</option>
                        <option value="seller">Продавец</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="attestations">Кол-во аттестаций</label>
                    <select id="attestations" name="attestations" required>
                        <option value="0" selected>0 - по умолчанию</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
            </div>

            <div class="buttons">
                <button type="submit" class="btn btn-primary">Рассчитать</button>
                <button type="button" id="clearBtn" class="btn btn-secondary">Очистить</button>
            </div>
        </form>

        <div class="result-card">
            <h2>Результат</h2>
            <div id="resultContent" class="result-placeholder">
                Заполните поля и нажмите «Рассчитать»
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
